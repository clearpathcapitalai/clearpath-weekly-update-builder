<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Weekly Update Builder · ClearPath Capital</title>
<style>
  :root {
    --bg: #f4f6f8;
    --panel: #ffffff;
    --ink: #0a2540;
    --ink-soft: #4b5b6c;
    --muted: #8a96a3;
    --border: #e3e8ee;
    --border-strong: #c9d2dd;
    --accent: #1a5fa8;
    --accent-soft: #e8f1fb;
    --accent-ink: #0a2540;
    --good: #1a7a3c;
    --bad:  #c0392b;
    --warn: #b25d1e;

    --radius: 8px;
    --radius-sm: 6px;
    --shadow: 0 1px 2px rgba(10,37,64,0.04), 0 1px 0 rgba(10,37,64,0.02);
    --shadow-pop: 0 18px 40px rgba(10,37,64,0.18);

    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: var(--font);
    color: var(--ink);
    background: var(--bg);
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ───────────────────── Topbar */
  .topbar {
    height: 60px;
    padding: 0 20px;
    background: #fff;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex: 0 0 auto;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark {
    width: 28px; height: 28px;
    border-radius: 6px;
    background: linear-gradient(135deg, #0a2540 0%, #1a5fa8 100%);
    position: relative;
  }
  .brand-mark::after {
    content: "";
    position: absolute; inset: 7px;
    border: 2px solid rgba(255,255,255,0.85);
    border-radius: 2px;
    border-bottom: none;
    border-right: none;
  }
  .brand-title { font-weight: 600; font-size: 15px; line-height: 1.1; }
  .brand-sub { font-size: 11.5px; color: var(--muted); margin-top: 2px; letter-spacing: 0.3px; }

  .top-actions { display: flex; align-items: center; gap: 8px; }

  .btn-primary, .btn-accent, .btn-ghost {
    border: 1px solid var(--border-strong);
    background: #fff;
    color: var(--ink);
    height: 36px;
    padding: 0 14px;
    border-radius: 6px;
    font: inherit;
    font-weight: 500;
    font-size: 13px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: background .12s, border-color .12s, color .12s, box-shadow .12s;
  }
  .btn-ghost:hover { background: #f5f7fa; }
  .btn-primary {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }
  .btn-primary:hover { background: #14304f; }
  .btn-primary:disabled { opacity: 0.6; cursor: progress; }
  .btn-accent {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .btn-accent:hover { background: #134d8a; }
  .btn-sm { height: 30px; padding: 0 10px; font-size: 12px; }
  .btn-ghost.danger { color: var(--bad); }
  .btn-ghost.danger:hover { background: #fff1ee; }

  .count-pill {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 18px; height: 18px;
    padding: 0 5px;
    border-radius: 9px;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 11px;
    font-weight: 600;
    margin-left: 4px;
  }

  /* ───────────────────── Layout */
  .layout {
    display: grid;
    grid-template-columns: 420px 1fr;
    flex: 1 1 auto;
    min-height: 0;
  }

  .controls {
    border-right: 1px solid var(--border);
    background: #fff;
    padding: 22px 22px 32px;
    overflow-y: auto;
    height: calc(100vh - 60px);
  }

  .preview-wrap {
    display: flex;
    flex-direction: column;
    background: var(--bg);
    height: calc(100vh - 60px);
  }

  /* ───────────────────── Form fields */
  .field { display: block; margin-bottom: 18px; }
  .field-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 4px;
  }
  .field-hint {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .input {
    width: 100%;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    padding: 9px 11px;
    font: inherit;
    font-size: 13px;
    background: #fff;
    color: var(--ink);
    resize: vertical;
    transition: border-color .12s, box-shadow .12s;
  }
  textarea.input { line-height: 1.45; min-height: 60px; }
  .input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .input:disabled { background: #f6f8fa; color: var(--muted); }

  .toggle-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: #f6f8fa;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin: 4px 0 22px;
    font-size: 13px;
    cursor: pointer;
    user-select: none;
  }
  .toggle-row input { accent-color: var(--accent); }

  /* ───────────────────── Source rows */
  .sources-head { margin-bottom: 10px; }
  .source-row {
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 6px;
    background: #fff;
    overflow: hidden;
  }
  .source-row.open { box-shadow: var(--shadow); }
  .source-head {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: transparent;
    border: 0;
    text-align: left;
    cursor: pointer;
    font: inherit;
    font-size: 13px;
    color: var(--ink);
  }
  .source-head:hover { background: #fafbfc; }
  .source-title { font-weight: 500; flex: 1; }
  .source-state {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
    letter-spacing: 0.2px;
  }
  .source-state.any { background: #f0f3f7; color: var(--muted); }
  .source-state.set { background: var(--accent-soft); color: var(--accent); }
  .caret { color: var(--muted); font-size: 11px; width: 10px; text-align: center; }

  .source-body {
    padding: 4px 12px 12px;
    border-top: 1px solid var(--border);
  }
  .source-hint { font-size: 12px; color: var(--muted); margin: 8px 0; }
  .source-input {
    width: 100%;
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    padding: 8px 10px;
    font: inherit;
    font-size: 12.5px;
    line-height: 1.5;
    resize: vertical;
    background: #fff;
  }
  .source-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .source-actions { display: flex; justify-content: flex-end; margin-top: 8px; }

  /* ───────────────────── Status */
  .status {
    margin-top: 18px;
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 12.5px;
    line-height: 1.45;
    border: 1px solid transparent;
  }
  .status-info  { background: var(--accent-soft); color: var(--accent); border-color: #cfe2f5; }
  .status-ok    { background: #eaf6ee; color: var(--good); border-color: #cdebd5; }
  .status-error { background: #fdecea; color: var(--bad);  border-color: #f4c8c2; }

  /* ───────────────────── Preview */
  .preview-toolbar {
    height: 44px;
    padding: 0 18px;
    border-bottom: 1px solid var(--border);
    background: #fff;
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 0 0 auto;
  }
  .preview-label {
    font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--muted); font-weight: 600;
  }
  .preview-sub { color: var(--ink-soft); font-size: 13px; }

  .preview-frame-shell {
    flex: 1 1 auto;
    overflow: auto;
    padding: 24px;
    display: flex;
    justify-content: center;
  }
  .preview-iframe {
    width: 100%;
    max-width: 720px;
    min-height: 100%;
    border: 0;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 4px 18px rgba(10,37,64,0.08);
  }

  /* ───────────────────── Spinner */
  .spinner {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 2px solid currentColor;
    border-right-color: transparent;
    display: inline-block;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ───────────────────── Sections */
  .section { margin-bottom: 18px; }
  .section-head h3 { margin: 0; font-size: 13px; font-weight: 600; color: var(--ink); }
  .section-head p { margin: 2px 0 8px; font-size: 12px; color: var(--muted); }
  .section-body { display: flex; flex-direction: column; gap: 6px; }

  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .row-3 { display: grid; grid-template-columns: 2fr 1fr 0.8fr; gap: 6px; margin-bottom: 4px; }
  .row-actions { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-top: 6px; }
  .lab { display: block; font-size: 11px; color: var(--ink-soft); margin-bottom: 3px; font-weight: 500; }
  .input.sm { padding: 6px 9px; font-size: 12.5px; }
  .lock-toggle { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink-soft); cursor: pointer; }
  .lock-toggle input { accent-color: var(--accent); }

  .muted { color: var(--muted); font-style: normal; font-size: 11px; }

  /* metric */
  .metric { border: 1px solid var(--border); border-radius: 6px; background: #fff; }
  .metric.locked { background: #fafbfc; border-color: #d8dfe8; }
  .metric-head { display: flex; align-items: center; gap: 10px; padding: 10px 12px; cursor: pointer; }
  .metric-head:hover { background: #fafbfc; }
  .metric-id { flex: 1; display: grid; grid-template-columns: 110px 80px 1fr; align-items: baseline; gap: 8px; min-width: 0; }
  .metric-label { font-size: 12px; color: var(--ink-soft); font-weight: 500; }
  .metric-val { font-weight: 600; font-size: 14px; }
  .metric-val.tone-up { color: var(--good); }
  .metric-val.tone-down { color: var(--bad); }
  .metric-val.tone-neutral { color: var(--ink); }
  .metric-val.tone-gold { color: #b89c57; }
  .metric-sub { font-size: 11.5px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .metric-state { display: flex; align-items: center; gap: 6px; }
  .metric-body { padding: 10px 12px 12px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
  .badge { font-size: 10.5px; padding: 2px 7px; border-radius: 9px; background: #f0f3f7; color: var(--muted); font-weight: 500; }
  .badge-lock { background: #fff4e0; color: #b25d1e; }
  .badge-src { background: var(--accent-soft); color: var(--accent); }

  /* paragraph */
  .para { border: 1px solid var(--border); border-radius: 6px; background: #fff; }
  .para-head { display: flex; align-items: center; gap: 10px; padding: 10px 12px; cursor: pointer; }
  .para-head:hover { background: #fafbfc; }
  .para-id { flex: 1; min-width: 0; }
  .para-label { font-size: 13px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .para-hint { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .para-state { display: flex; align-items: center; gap: 6px; }
  .badge.mode-auto { background: var(--accent-soft); color: var(--accent); }
  .badge.mode-regenerate { background: #eaf6ee; color: var(--good); }
  .badge.mode-manual { background: #f0f3f7; color: var(--muted); }
  .badge.mode-newSubject { background: #fff4e0; color: #b25d1e; }
  .para-body { padding: 10px 12px 12px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }

  .detail-edit { padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 6px; background: #fff; }

  /* ───────────────────── History drawer */
  .history-overlay {
    position: fixed; inset: 0;
    background: rgba(10,37,64,0.32);
    z-index: 50;
    display: flex; justify-content: flex-end;
  }
  .history-drawer {
    width: 480px; max-width: 90vw;
    height: 100%;
    background: #fff;
    box-shadow: var(--shadow-pop);
    display: flex; flex-direction: column;
  }
  .history-head {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 10px;
  }
  .history-title { font-weight: 600; font-size: 15px; }
  .history-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .history-list { flex: 1; overflow-y: auto; padding: 8px 12px 18px; }
  .history-item {
    padding: 12px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin: 8px 0;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    background: #fff;
  }
  .history-item:hover { background: #fafbfc; }
  .history-item-main { flex: 1; min-width: 0; }
  .history-item-week { font-weight: 600; font-size: 13.5px; }
  .history-item-meta { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
  .history-item-meta .muted { color: var(--ink-soft); }
  .history-item-actions { display: flex; flex-direction: column; gap: 4px; }
  .history-empty {
    padding: 30px 16px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
